(*!
 * @abstract
 * Configurable parameters for the model.
 *
 * @discussion
 * This model has been checked for all possible 3-threads configurations.
 * Running this verification takes about 40 seconds on a recent machine
 * (without owner/readers tracking, and about 6 minutes otherwise).
 *
 * @constant Threads
 * The set of threads to check with (default: {t1, t2, t3})
 *
 * @constant Urgent
 * The subset of Writers that are urgent (default: {t1})
 *
 * @constant XBias
 * Whether the lock to test is writer (TRUE) or reader (FALSE) biased.
 *)
CONSTANTS       Threads      = {t1, t2, t3}
                Urgent       = {t1}
                XBias        = FALSE

(*
 * Static configuration for the model
 *)
SPECIFICATION   Spec

VIEW            View

CONSTANT        defaultInitValue = defaultInitValue

SYMMETRY        Perms

INVARIANTS      ParamsCorrect
                Exclusion
                NoMissingWakeup

\* vim:ft=tla et sw=8 ts=8 tw=80:
